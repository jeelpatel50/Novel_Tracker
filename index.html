<!DOCTYPE html>
<html lang="en" data-theme="black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
    
    <style>
        body { background-color: #000; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card-amoled { background-color: #0f0f0f; border: 1px solid #1f1f1f; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-amoled:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.7); }
        .editable-num { background: transparent; border: 1px solid transparent; color: white; text-align: center; font-weight: bold; width: 100%; border-radius: 6px; padding: 2px; cursor: text; }
        .editable-num:hover { border-color: #333; background: #0a0a0a; }
        .editable-num:focus { outline: none; border-color: #3b82f6; background: #111;}
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes progress-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .progress-bar-animated { background: linear-gradient(90deg, #a855f7 25%, #06b6d4 50%, #a855f7 75%); background-size: 200% 100%; animation: progress-loading 1.5s infinite linear; }
    </style>
</head>
<body class="min-h-screen p-4 pb-20">

    <div class="navbar bg-[#0a0a0a] border-b border-gray-800 rounded-box mb-8 shadow-2xl px-6">
        <div class="flex-1">
            <span id="logoText" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">NovelTrack</span>
        </div>
        <div class="flex-none gap-4">
            <button class="btn btn-sm btn-ghost text-gray-400" onclick="my_modal_theme.showModal()"><i class="fas fa-palette"></i></button>
            <div id="userInfo" class="hidden flex items-center gap-3 bg-gray-900/50 px-3 py-1.5 rounded-full border border-gray-800">
                <img id="userImg" class="w-6 h-6 rounded-full">
                <button class="btn btn-xs btn-error btn-outline border-none" onclick="logout()">Sign Out</button>
            </div>
            <button id="loginBtn" class="btn btn-primary btn-sm bg-blue-600 border-none text-white" onclick="login()">Login</button>
        </div>
    </div>

    <div class="container mx-auto max-w-5xl">
        <div class="flex flex-col md:flex-row gap-6 mb-8 justify-between items-center bg-[#0f0f0f] p-6 rounded-3xl border border-gray-800 shadow-xl">
            <div class="flex gap-10">
                <div class="text-center md:text-left">
                    <div class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Library</div>
                    <div class="text-4xl font-black text-white" id="totalNovels">0</div>
                </div>
                <div class="text-center md:text-left">
                    <div class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Unread</div>
                    <div class="text-4xl font-black text-blue-400" id="updatesAvailable">0</div>
                </div>
            </div>
            <div class="flex gap-3">
                <button class="btn btn-primary bg-gradient-to-r from-blue-600 to-purple-600 border-none text-white shadow-lg shadow-blue-500/20" onclick="my_modal_1.showModal()">
                    <i class="fas fa-plus mr-2"></i> Add Novel
                </button>
            </div>
        </div>

        <div id="novelList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
    </div>

    <dialog id="my_modal_download" class="modal">
        <div class="modal-box bg-[#0f0f0f] border border-gray-800 text-center rounded-3xl">
            <h3 class="font-bold text-lg text-white mb-6">Processing Cloud Download</h3>
            <div class="w-full bg-gray-900 rounded-full h-2 mb-4 overflow-hidden">
                <div class="h-2 rounded-full progress-bar-animated" style="width: 100%"></div>
            </div>
            <p id="downloadStatusText" class="text-xs font-mono text-gray-500 uppercase tracking-tighter">Connecting to Azure...</p>
        </div>
    </dialog>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentUser = null, localNovels = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('userImg').src = user.photoURL;
                loadNovels();
            }
        });

        function loadNovels() {
            db.collection('users').doc(currentUser.uid).collection('novels').onSnapshot(snap => {
                localNovels = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderNovels(localNovels);
            });
        }

        async function triggerDownload(url, read, total) {
            document.getElementById('my_modal_download').showModal();
            try {
                const resp = await fetch(`${SERVER_URL}/start-download`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url, read, total })
                });
                const { job_id } = await resp.json();
                const poll = setInterval(async () => {
                    const sResp = await fetch(`${SERVER_URL}/status/${job_id}`);
                    const data = await sResp.json();
                    document.getElementById('downloadStatusText').innerText = `Status: ${data.status.toUpperCase()}`;
                    if(data.status === 'done') {
                        clearInterval(poll);
                        window.location.href = `${SERVER_URL}/download/${job_id}`;
                        setTimeout(() => document.getElementById('my_modal_download').close(), 2000);
                    }
                }, 2000);
            } catch(e) { alert("Azure server offline!"); document.getElementById('my_modal_download').close(); }
        }

        function renderNovels(novels) {
            const list = document.getElementById('novelList');
            list.innerHTML = '';
            let unreadTotal = 0;

            novels.forEach(data => {
                const unread = (data.totalChapters || 0) - (data.readChapters || 0);
                if(unread > 0) unreadTotal++;
                const milestone = data.milestone || 5;
                const progress = data.totalChapters > 0 ? (data.readChapters / data.totalChapters) * 100 : 0;
                
                // --- RADIAL CALCULATIONS ---
                let circleVal = unread >= milestone ? 100 : (unread / milestone) * 100;
                let circleColor = unread >= milestone ? "text-green-400" : "text-blue-400";

                const html = `
                <div class="card card-amoled p-5 rounded-3xl flex flex-row gap-5 items-center relative overflow-hidden">
                    <img src="${data.image || 'https://via.placeholder.com/150'}" class="w-20 h-28 object-cover rounded-2xl shadow-2xl shrink-0">
                    
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="font-bold text-gray-100 truncate text-lg pr-2">${data.title}</h2>
                            <div class="radial-progress ${circleColor} bg-black/50 text-[10px] font-black border-2 border-black" style="--value:${circleVal}; --size:2.8rem; --thickness: 4px;" role="progressbar">${unread}</div>
                        </div>

                        <div class="w-full bg-gray-900 h-1 rounded-full mb-4 overflow-hidden">
                            <div class="h-full bg-blue-600 shadow-[0_0_10px_#3b82f6]" style="width:${progress}%"></div>
                        </div>

                        <div class="grid grid-cols-3 gap-1 bg-black/40 p-2 rounded-2xl border border-gray-800/50 mb-4">
                            <div class="text-center border-r border-gray-800"><div class="text-[9px] font-bold text-gray-500 uppercase">Read</div><div class="text-white font-bold">${data.readChapters}</div></div>
                            <div class="text-center border-r border-gray-800"><div class="text-[9px] font-bold text-gray-500 uppercase">Total</div><div class="text-white font-bold">${data.totalChapters}</div></div>
                            <div class="text-center"><div class="text-[9px] font-bold text-gray-500 uppercase">Goal</div><div class="text-white font-bold">${milestone}</div></div>
                        </div>

                        <div class="flex justify-between items-center">
                            <div class="flex gap-1">
                                <button class="btn btn-xs btn-square bg-gray-800 border-none text-white hover:bg-blue-600" onclick="changeRead('${data.id}', 1)">+1</button>
                                <button class="btn btn-xs bg-gray-800 border-none text-white hover:bg-blue-600" onclick="changeRead('${data.id}', ${milestone})">+${milestone}</button>
                            </div>
                            <div class="flex gap-2">
                                <button class="btn btn-sm btn-circle btn-info bg-blue-600/20 border-none text-blue-400 hover:bg-blue-600 hover:text-white" title="Cloud Download" onclick="triggerDownload('${data.url}', ${data.readChapters}, ${data.totalChapters})"><i class="fas fa-cloud-download-alt"></i></button>
                                <button class="btn btn-sm btn-circle btn-error bg-red-600/20 border-none text-red-500 hover:bg-red-600 hover:text-white" title="Delete" onclick="deleteNovel('${data.id}')"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
                list.innerHTML += html;
            });
            document.getElementById('totalNovels').innerText = novels.length;
            document.getElementById('updatesAvailable').innerText = unreadTotal;
        }

        async function changeRead(id, amt) {
            const novel = localNovels.find(n => n.id === id);
            const newVal = (novel.readChapters || 0) + amt;
            db.collection('users').doc(currentUser.uid).collection('novels').doc(id).update({readChapters: newVal});
        }
        async function deleteNovel(id) { if(confirm("Delete novel?")) db.collection('users').doc(currentUser.uid).collection('novels').doc(id).delete(); }
        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); location.reload(); }
        Sortable.create(document.getElementById('novelList'), { animation: 150 });
    </script>
</body>
</html>
